<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DU Cover Page Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="container">
        <header class="main-header">
            <img src="du-logo.png" alt="Dhaka University Logo" class="header-logo">
            <h1>Dhaka University Cover Page Generator 📝</h1>
            <p>Create a professional A4 cover page in seconds. You can edit the layout on the next page.</p>
        </header>
        
        <form id="cover-form">
            <div class="form-group">
                <label for="title">Assignment / Report Title</label>
                <input type="text" id="title" placeholder="e.g., A Study on Consumer Behavior">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="course-name">Course Name</label>
                    <input type="text" id="course-name" placeholder="e.g., Principles of Marketing">
                </div>
                <div class="form-group">
                    <label for="course-code">Course Code</label>
                    <input type="text" id="course-code" placeholder="e.g., MKT-101">
                </div>
            </div>

            <div class="form-group">
                <label for="submitted-by">Submitted By</label>
                <textarea id="submitted-by" rows="4" placeholder="Your Name&#10;ID: 123-456-789&#10;Section: A"></textarea>
            </div>

            <div class="form-group">
                <label for="teacher-list">Submitted To</label>
                <select id="teacher-list">
                    <option value="" disabled selected>Select a faculty member...</option>
                </select>
            </div>

            <button type="submit" class="cta-button">Generate & Edit Layout ✨</button>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
